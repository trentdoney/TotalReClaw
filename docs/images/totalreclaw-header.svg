    <text x="34" y="150" fill="#E7D4BD" font-family="IBM Plex Mono, monospace" font-size="20">verdict: prior_fix_found</text>
    <text x="34" y="190" fill="#AFB8C6" font-family="IBM Plex Mono, monospace" font-size="18">reference: gateway restart after config sync</text>
